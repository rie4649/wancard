<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名刺メーカー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>名刺メーカー</h1>

<section class="preview-area">
  <div id="card" class="card">

    <div class="card-info">
      <div id="previewName" class="dog-name">名前</div>
      <div id="previewBirthday" class="birthday">誕生日</div>
      <div id="previewMessage" class="message">一言</div>
      <div id="previewInstagram" class="instagram">Instagram</div>
    </div>

    <div class="photo-frame">
      <img id="dogPhoto" class="dog-photo" alt="">
      <img id="maskPhoto" class="mask-photo" src="pink.png" alt="">
      <div id="maskInitial" class="mask-initial">P</div>
    </div>

  </div>

  <button id="saveBtn">保存</button>
</section>

<section class="control-area">

  <label>写真を選ぶ</label>
  <input type="file" id="photoInput" accept="image/*">

  <label>写真 左右</label>
  <input type="range" id="photoX" min="-200" max="200" value="0">

  <label>写真 上下</label>
  <input type="range" id="photoY" min="-200" max="200" value="0">

  <label>写真 大きさ</label>
  <input type="range" id="photoScale" min="70" max="240" value="100">

  <label>覆面カラー</label>
  <select id="maskSelect">
    <option value="pink.png">ピンク</option>
    <option value="shiro.png">白</option>
    <option value="blue.png">青</option>
  </select>

  <label>覆面 左右</label>
  <input type="range" id="maskX" min="-200" max="200" value="0">

  <label>覆面 上下</label>
  <input type="range" id="maskY" min="-200" max="200" value="0">

  <label>覆面 大きさ</label>
  <input type="range" id="maskScale" min="60" max="260" value="150">

  <label>名前</label>
  <input type="text" id="nameInput" placeholder="名前">

  <label>誕生日</label>
  <input type="text" id="birthdayInput" placeholder="5月31日">

  <label>一言</label>
  <input type="text" id="messageInput" placeholder="一言">

  <label>Instagram</label>
  <input type="text" id="instagramInput" placeholder="@instagram">

  <label>イニシャル</label>
  <input type="text" id="initialInput" maxlength="2" placeholder="P">

</section>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
