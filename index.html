<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BRIEFSDAN-DOG Ver3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial',sans-serif;
}

body{
background:#111;
color:#fff;
padding-bottom:90px;
}

:root{
--main:#ff4fa3;
--card:#1b1b1b;
--text:#ffffff;
}

header{
background:linear-gradient(135deg,#000,var(--main));
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

.container{
padding:15px;
}

.card{
background:var(--card);
border:3px solid var(--main);
border-radius:20px;
padding:15px;
max-width:900px;
margin:auto;
box-shadow:0 0 20px rgba(255,79,163,.5);
}

.previewCard{
width:100%;
aspect-ratio:1.8/1;
background:#222;
border-radius:20px;
overflow:hidden;
position:relative;
border:4px solid var(--main);
}

.photo{
position:absolute;
cursor:move;
touch-action:none;
}

.photo img{
display:block;
width:100%;
height:100%;
object-fit:cover;
}

.info{
position:absolute;
right:20px;
top:20px;
text-align:right;
z-index:10;
}

.info h2{
font-size:28px;
color:var(--main);
}

.info p{
font-size:14px;
margin-top:5px;
}

.controls{
margin-top:20px;
display:grid;
gap:12px;
}

input,button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

input{
background:#333;
color:white;
}

button{
background:var(--main);
color:white;
font-weight:bold;
}

.colorBtns{
display:flex;
gap:10px;
}

.colorBtns button{
flex:1;
}

.bottomMenu{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
border-top:3px solid var(--main);
z-index:999;
}

.bottomMenu button{
width:auto;
padding:8px 14px;
border-radius:12px;
}

a{
text-decoration:none;
color:white;
}
</style>
</head>

<body>

<header>BRIEFSDAN-DOG</header>

<div class="container">

<div class="card">

<div class="previewCard" id="card">

<div class="photo" id="photoBox"
style="left:20px;top:20px;width:180px;height:180px;">
<img id="photoPreview">
</div>

<div class="info">
<h2 id="cardName">BREAFSDAN-DOG</h2>
<p id="cardText">My Digital Card</p>
</div>

</div>

<div class="controls">

<input type="text" id="nameInput" placeholder="名前">

<input type="file" id="upload" accept="image/*">

<label>写真サイズ</label>
<input type="range" id="sizeRange" min="80" max="350" value="180">

<input type="text" id="instaInput"
placeholder="Instagram URL">

<button onclick="saveCard()">💾 マイカード保存</button>

<div class="colorBtns">
<button onclick="setTheme('pink')">🩷</button>
<button onclick="setTheme('white')">🤍</button>
<button onclick="setTheme('blue')">💙</button>
</div>

</div>

</div>
</div>

<div class="bottomMenu">

<button onclick="home()">🏠</button>

<button onclick="openInstagram()">📸</button>

<button onclick="saveCard()">💾</button>

<button onclick="location.reload()">⚙️</button>

</div>

<script>

const upload=document.getElementById("upload");
const photo=document.getElementById("photoBox");
const img=document.getElementById("photoPreview");

upload.addEventListener("change",e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(ev){
img.src=ev.target.result;
};

reader.readAsDataURL(file);
});

document.getElementById("nameInput").addEventListener("input",e=>{
document.getElementById("cardName").textContent=e.target.value||"BREAFSDAN-DOG";
});

document.getElementById("sizeRange").addEventListener("input",e=>{
const s=e.target.value;
photo.style.width=s+"px";
photo.style.height=s+"px";
});

function setTheme(type){

if(type==="pink"){
document.documentElement.style.setProperty("--main","#ff4fa3");
document.documentElement.style.setProperty("--card","#1b1b1b");
}

if(type==="white"){
document.documentElement.style.setProperty("--main","#ffffff");
document.documentElement.style.setProperty("--card","#444");
}

if(type==="blue"){
document.documentElement.style.setProperty("--main","#42a5ff");
document.documentElement.style.setProperty("--card","#13233d");
}

}

function openInstagram(){
const url=document.getElementById("instaInput").value;

if(url){
window.open(url,"_blank");
}
}

function saveCard(){

const data={
name:document.getElementById("nameInput").value,
instagram:document.getElementById("instaInput").value,
photo:img.src,
left:photo.style.left,
top:photo.style.top,
width:photo.style.width,
height:photo.style.height
};

localStorage.setItem("briefsdandog",JSON.stringify(data));

alert("保存しました");
}

window.onload=function(){

const data=JSON.parse(localStorage.getItem("briefsdandog"));

if(!data)return;

document.getElementById("nameInput").value=data.name||"";
document.getElementById("instaInput").value=data.instagram||"";

document.getElementById("cardName").textContent=data.name||"BREAFSDAN-DOG";

img.src=data.photo||"";

photo.style.left=data.left;
photo.style.top=data.top;
photo.style.width=data.width;
photo.style.height=data.height;

};

let active=false;
let startX,startY;

photo.addEventListener("pointerdown",e=>{
active=true;
startX=e.clientX-photo.offsetLeft;
startY=e.clientY-photo.offsetTop;
});

document.addEventListener("pointermove",e=>{

if(!active)return;

photo.style.left=(e.clientX-startX)+"px";
photo.style.top=(e.clientY-startY)+"px";

});

document.addEventListener("pointerup",()=>{
active=false;
});

function home(){
window.scrollTo({
top:0,
behavior:"smooth"
});
}

</script>

</body>
</html>
