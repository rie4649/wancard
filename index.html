<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BRIEFSDAN-DOG 名刺メーカー</title>

<style>
  body {
    margin: 0;
    font-family: "Helvetica", "Arial", sans-serif;
    background: #ffffff;
    color: #000000;
  }

  section {
    display: none;
    padding: 40px 20px;
    text-align: center;
  }
  section.active {
    display: block;
  }

  #screen-home h1 {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 40px;
  }

  button {
    background: #000;
    color: #fff;
    border: none;
    padding: 14px 26px;
    font-size: 16px;
    border-radius: 8px;
    margin: 10px;
    cursor: pointer;
  }

  #create-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
  }

  #cardPreview {
    width: 320px;
    height: 200px;
    background: #fff;
    border: 2px solid #000;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  .dog-img, .mask-img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140px;
    height: 140px;
    object-fit: cover;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #initialText {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    font-weight: 900;
    color: #ffffff;
    -webkit-text-stroke: 3px #000000;
  }

  #infoArea {
    position: absolute;
    bottom: 8px;
    left: 12px;
    right: 12px;
    font-size: 12px;
    text-align: left;
  }

  #controlPanel {
    width: 300px;
    text-align: left;
  }

  #controlPanel input, #controlPanel textarea {
    width: 100%;
    margin: 6px 0;
    padding: 6px;
    font-size: 14px;
  }
</style>
</head>

<body>

<!-- ① トップ画面 -->
<section id="screen-home" class="active">
  <h1>BRIEFSDAN-DOG<br>名刺メーカー</h1>
  <button id="goCreate">名刺を作る</button>
  <button id="goBook">名刺手帳を見る</button>
</section>

<!-- ② 名刺作成画面 -->
<section id="screen-create">
  <h2>名刺を作る</h2>

  <div id="create-container">

    <div id="cardPreview">
      <img id="dogImg" class="dog-img">
      <img id="maskImg" class="mask-img" src="mask_pink.png">
      <div id="initialText"></div>

      <div id="infoArea">
        <div id="nameField">名前：</div>
        <div id="birthdayField">誕生日：</div>
        <div id="commentField">一言：</div>
        <div id="instaField">Instagram：</div>
      </div>
    </div>

    <div id="controlPanel">
      <label>犬写真アップロード</label>
      <input type="file" id="dogUpload" accept="image/*">

      <label>覆面カラー</label>
      <button data-mask="pink">ピンク</button>
      <button data-mask="white">白</button>
      <button data-mask="blue">青</button>

      <label>イニシャル</label>
      <input type="text" id="initialInput" maxlength="2">

      <label>名前</label>
      <input type="text" id="nameInput">

      <label>誕生日</label>
      <input type="text" id="birthdayInput">

      <label>一言</label>
      <textarea id="commentInput"></textarea>

      <label>Instagram</label>
      <input type="text" id="instaInput">

      <button id="goPreview">プレビューへ進む</button>
    </div>

  </div>
</section>

<!-- ③ プレビュー画面 -->
<section id="screen-preview">
  <h2>プレビュー</h2>
  <div id="finalCard"></div>
  <button id="saveCard">保存</button>
  <button id="goQR">QRコード表示</button>
  <button id="backToCreate">戻る</button>
</section>

<!-- ④ QRコード画面 -->
<section id="screen-qr">
  <h2>QRコード</h2>
  <div id="qrCode"></div>
  <button id="backToPreview">戻る</button>
</section>

<!-- ⑤ 名刺手帳 -->
<section id="screen-book">
  <h2>名刺手帳</h2>
  <div id="bookList"></div>
  <button id="backHome">トップへ戻る</button>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* 画面切り替え */
function showScreen(id) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.getElementById("goCreate").onclick = () => showScreen("screen-create");

/* 犬写真アップロード */
document.getElementById("dogUpload").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById("dogImg").src = reader.result;
  };
  reader.readAsDataURL(file);
});

/* 覆面カラー切り替え */
document.querySelectorAll("[data-mask]").forEach(btn => {
  btn.onclick = () => {
    const color = btn.getAttribute("data-mask");
    document.getElementById("maskImg").src = `mask_${color}.png`;
  };
});

/* 入力反映 */
document.getElementById("initialInput").oninput = () => {
  document.getElementById("initialText").textContent =
    document.getElementById("initialInput").value.toUpperCase();
};

document.getElementById("nameInput").oninput = () =>
  document.getElementById("nameField").textContent = "名前：" + nameInput.value;

document.getElementById("birthdayInput").oninput = () =>
  document.getElementById("birthdayField").textContent = "誕生日：" + birthdayInput.value;

document.getElementById("commentInput").oninput = () =>
  document.getElementById("commentField").textContent = "一言：" + commentInput.value;

document.getElementById("instaInput").oninput = () =>
  document.getElementById("instaField").textContent = "Instagram：" + instaInput.value;

/* プレビューへ */
document.getElementById("goPreview").onclick = () => {
  const preview = document.getElementById("cardPreview").cloneNode(true);
  preview.style.transform = "scale(1.2)";
  document.getElementById("finalCard").innerHTML = "";
  document.getElementById("finalCard").appendChild(preview);
  showScreen("screen-preview");
};

/* QRコードへ */
document.getElementById("goQR").onclick = () => {
  const cardData = {
    dog: dogImg.src,
    mask: maskImg.src,
    initial: initialInput.value.toUpperCase(),
    name: nameInput.value,
    birthday: birthdayInput.value,
    comment: commentInput.value,
    insta: instaInput.value
  };

  const encoded = encodeURIComponent(JSON.stringify(cardData));
  const url = location.origin + location.pathname + "?card=" + encoded;

  const qrArea = document.getElementById("qrCode");
  qrArea.innerHTML = "";
  new QRCode(qrArea, { text: url, width: 200, height: 200 });

  showScreen("screen-qr");
};

document.getElementById("backToPreview").onclick = () =>
  showScreen("screen-preview");

document.getElementById("backToCreate").onclick = () =>
  showScreen("screen-create");

/* 名刺手帳 */
document.getElementById("goBook").onclick = () => {
  loadBook();
  showScreen("screen-book");
};

document.getElementById("backHome").onclick = () =>
  showScreen("screen-home");

function loadBook() {
  const list = document.getElementById("bookList");
  list.innerHTML = "";

  const book = JSON.parse(localStorage.getItem("meishiBook") || "[]");

  if (book.length === 0) {
    list.innerHTML = "<p>まだ名刺がありません</p>";
    return;
  }

  book.forEach((card, index) => {
    const item = document.createElement("div");
    item.style = `
      width: 160px;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 10px;
      margin: 10px auto;
      background:#fff;
    `;

    item.innerHTML = `
      <div style="position:relative; width:100%; height:100px; overflow:hidden;">
        <img src="${card.dog}" style="position:absolute; top:50%; left:50%; width:100px; height:100px; transform:translate(-50%,-50%); object-fit:cover;">
        <img src="${card.mask}" style="position:absolute; top:50%; left:50%; width:100px; height:100px; transform:translate(-50%,-50%); object-fit:cover;">
        <div style="position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); font-size:28px; font-weight:900; color:#fff; -webkit-text-stroke:2px #000;">
          ${card.initial}
        </div>
      </div>

      <p style="margin:6px 0; font-size:14px;">${card.name}</p>

      <button data-del="${index}" style="background:#000; color:#fff; padding:6px 10px; border:none; border-radius:6px; font-size:12px;">削除</button>
    `;

    list.appendChild(item);
  });

  document.querySelectorAll("[data-del]").forEach(btn => {
    btn.onclick = () => {
      const index = btn.getAttribute("data-del");
      const book = JSON.parse(localStorage.getItem("meishiBook") || "[]");
      book.splice(index, 1);
      localStorage.setItem("meishiBook", JSON.stringify(book));
      loadBook();
    };
  });
}
</script>

</body>
</html>
