<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAN CARD</title>

<style>
body{
font-family:sans-serif;
background:#f5f7ff;
text-align:center;
padding:20px;
}

.card{
max-width:400px;
margin:auto;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.vip{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:15px;
border-radius:15px;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

img{
width:180px;
height:180px;
object-fit:cover;
border-radius:15px;
}

.name{
font-size:32px;
font-weight:bold;
margin-top:15px;
}

.job{
font-size:20px;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<div class="vip">
👑 VIP MEMBER CARD
</div>

<img src="https://placehold.co/300x300">

<div class="name">
CHA CHA
</div>

<div class="job">
Chief Snack Officer<br>
おやつ最高責任者
</div>

</div>

</body>
</html>
