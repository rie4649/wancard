<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAN CARD</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(180deg,#fff7fb,#f5f7ff);
text-align:center;
padding:16px;
color:#333;
}

h1{
font-size:38px;
color:#5b2b00;
margin-bottom:4px;
}

.subtitle{
font-size:15px;
color:#8a5a44;
margin-bottom:18px;
}

.formBox{
max-width:430px;
margin:0 auto 18px auto;
background:white;
border-radius:22px;
padding:18px;
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

input, select{
width:92%;
font-size:17px;
padding:12px;
margin:8px 0;
border-radius:12px;
border:2px solid #f2d7a0;
box-sizing:border-box;
}

button{
font-size:19px;
font-weight:bold;
padding:13px 24px;
border:none;
border-radius:16px;
background:#d4a017;
color:white;
margin-top:10px;
}

.card{
max-width:430px;
margin:auto;
background:#fffdf5;
border-radius:26px;
padding:18px;
box-shadow:0 8px 22px rgba(0,0,0,.18);
border:5px solid #d4a017;
}

.vip{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:16px;
border-radius:18px;
font-size:24px;
font-weight:bold;
margin-bottom:16px;
letter-spacing:1px;
}

.photoFrame{
width:210px;
height:210px;
margin:auto;
border-radius:24px;
overflow:hidden;
border:5px solid #d4a017;
background:#eee;
}

#dogPhoto{
width:100%;
height:100%;
object-fit:cover;
object-position:center center;
}

.name{
font-size:36px;
font-weight:bold;
margin-top:18px;
letter-spacing:2px;
color:#4b2e05;
}

.job{
font-size:20px;
color:#6b4a12;
line-height:1.7;
margin-top:8px;
}

.badge{
font-size:17px;
font-weight:bold;
background:#fff0c7;
border-radius:999px;
display:inline-block;
padding:8px 18px;
margin-top:14px;
color:#8a5a00;
}

.instaBtn{
display:none;
margin:16px auto 8px auto;
background:#e1306c;
color:white;
font-size:18px;
font-weight:bold;
padding:12px 22px;
border-radius:999px;
text-decoration:none;
width:70%;
}

#qrBox{
display:none;
margin-top:12px;
}

#qrBox img{
width:120px;
height:120px;
border-radius:12px;
border:3px solid #d4a017;
background:white;
}

.small{
font-size:14px;
color:#777;
margin-top:10px;
}

.rangeBox{
font-size:14px;
color:#666;
margin-top:6px;
}
</style>
</head>

<body>

<h1>🐶 WAN CARD</h1>
<div class="subtitle">世界にひとつだけのうちの子名刺</div>

<div class="formBox">
<div class="small">① 写真を選んでね</div>
<input type="file" id="photoInput" accept="image/*">

<div class="rangeBox">写真の横位置</div>
<input type="range" id="posX" min="0" max="100" value="50">

<div class="rangeBox">写真の縦位置</div>
<input type="range" id="posY" min="0" max="100" value="50">

<div class="small">② 名前を入力</div>
<input type="text" id="nameInput" placeholder="例：ぽむ">

<div class="small">③ Instagramを入力</div>
<input type="text" id="instaInput" placeholder="例：pocha1005 または Instagram URL">

<div class="small">④ 肩書きを選択</div>
<select id="jobSelect">
<option value="Chief Snack Officer<br>おやつ最高責任者">Chief Snack Officer｜おやつ最高責任者</option>
<option value="Super Model<br>モデル犬認定証">Super Model｜モデル犬認定証</option>
<option value="Security Manager<br>玄関警備主任">Security Manager｜玄関警備主任</option>
<option value="Nap Director<br>昼寝部長">Nap Director｜昼寝部長</option>
<option value="Treat Inspector<br>おやつ検査官">Treat Inspector｜おやつ検査官</option>
<option value="Happiness Manager<br>幸せ係長">Happiness Manager｜幸せ係長</option>
<option value="Dog Idol<br>わんこアイドル">Dog Idol｜わんこアイドル</option>
<option value="CEO<br>ちゅーる営業本部長">CEO｜ちゅーる営業本部長</option>
<option value="Princess Member<br>お姫様認定証">Princess Member｜お姫様認定証</option>
<option value="Prince Member<br>王子様認定証">Prince Member｜王子様認定証</option>
<option value="Professional Beggar<br>おねだり職人">Professional Beggar｜おねだり職人</option>
<option value="Food Hunter<br>食べ物探索隊">Food Hunter｜食べ物探索隊</option>
<option value="Snack Detector<br>おやつ探知機">Snack Detector｜おやつ探知機</option>
<option value="Sleeping Champion<br>昼寝世界王者">Sleeping Champion｜昼寝世界王者</option>
<option value="Walk Leader<br>お散歩推進部長">Walk Leader｜お散歩推進部長</option>
<option value="Sofa Guard<br>ソファー警備隊長">Sofa Guard｜ソファー警備隊長</option>
<option value="Smile Ambassador<br>笑顔大使">Smile Ambassador｜笑顔大使</option>
</select>

<br>
<button onclick="makeCard()">✨ 名刺を作る</button>
</div>

<div class="card">

<div class="vip">
👑 VIP MEMBER CARD
</div>

<div class="photoFrame">
<img id="dogPhoto" src="https://placehold.co/300x300?text=WAN">
</div>

<div id="cardName" class="name">
POMU
</div>

<div id="cardJob" class="job">
Super Model<br>
モデル犬認定証
</div>

<a id="instaBtn" class="instaBtn" target="_blank">
📸 Instagramを見る
</a>

<div id="qrBox">
<div class="small">QRコードでInstagramへ</div>
<img id="qrImage">
</div>

<div class="badge">
🐾 OFFICIAL WAN CARD 🐾
</div>

</div>

<script>
const photoInput = document.getElementById("photoInput");
const dogPhoto = document.getElementById("dogPhoto");
const posX = document.getElementById("posX");
const posY = document.getElementById("posY");

photoInput.addEventListener("change", function(event){
 const file = event.target.files[0];

 if(file){
   const reader = new FileReader();

   reader.onload = function(e){
     dogPhoto.src = e.target.result;
   };

   reader.readAsDataURL(file);
 }
});

function updatePhotoPosition(){
 dogPhoto.style.objectPosition = posX.value + "% " + posY.value + "%";
}

posX.addEventListener("input", updatePhotoPosition);
posY.addEventListener("input", updatePhotoPosition);

function makeCard(){
 const name = document.getElementById("nameInput").value.trim();
 const job = document.getElementById("jobSelect").value;
 const insta = document.getElementById("instaInput").value.trim();

 if(name !== ""){
   document.getElementById("cardName").innerHTML = name;
 }

 document.getElementById("cardJob").innerHTML = job;

 if(insta !== ""){
   let url = insta;

   if(!url.startsWith("http")){
     url = "https://www.instagram.com/" + insta.replace("@","");
   }

   document.getElementById("instaBtn").href = url;
   document.getElementById("instaBtn").style.display = "block";

   document.getElementById("qrImage").src =
   "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);

   document.getElementById("qrBox").style.display = "block";
 }
}
</script>

</body>
</html>
