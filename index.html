<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREAFSDANDOG名刺作成</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#030303;
  color:#f7d77a;
  text-align:center;
}
.app{
  max-width:430px;
  margin:auto;
  padding:18px;
}
.logo{
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
  margin-top:20px;
  color:#f7d77a;
}
.sub{
  color:#e8c86a;
  font-size:14px;
  margin:8px 0 20px;
}

/* VIP名刺 */
.card{
  width:100%;
  aspect-ratio:1.75/1;
  background:linear-gradient(135deg,#050505,#171717,#050505);
  border:2px solid #f7d77a;
  border-radius:20px;
  padding:14px;
  box-sizing:border-box;
  box-shadow:0 0 22px rgba(247,215,122,.45);
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
}
.card-title{
  font-size:17px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:8px;
  color:#f7d77a;
}
.vip{
  position:absolute;
  top:10px;
  right:14px;
  font-size:10px;
  color:#f7d77a;
}
.card-body{
  display:flex;
  gap:12px;
  align-items:center;
}

/* 社員証風写真枠 */
.photo-frame{
  width:42%;
  aspect-ratio:1.15/1;
  background:#222;
  border:4px solid #f7d77a;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 14px rgba(247,215,122,.55);
}
.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform-origin:center center;
}
.dog-placeholder{
  font-size:48px;
  margin-top:22px;
}

/* 覆面 */
.mask-overlay{
  position:absolute;
  inset:8px;
  border:8px solid #ff6fbd;
  border-radius:45% 45% 35% 35%;
  pointer-events:none;
  box-shadow:0 0 8px rgba(0,0,0,.8);
}
.mask-pink{border-color:#ff6fbd;}
.mask-white{border-color:#fff;}
.mask-blue{border-color:#67cfff;}

.initial{
  position:absolute;
  top:7px;
  left:50%;
  transform:translateX(-50%);
  font-weight:900;
  font-size:26px;
  color:#fff;
  text-shadow:0 0 6px #000;
  z-index:5;
}

/* 情報 */
.info{
  flex:1;
  text-align:left;
  font-size:13px;
  line-height:1.7;
  color:#f7d77a;
}
.name{
  font-size:23px;
  font-weight:900;
  color:#f7d77a;
}
.insta-link{
  color:#f7d77a;
  text-decoration:none;
  font-weight:bold;
}
.qr{
  position:absolute;
  right:14px;
  bottom:12px;
  width:48px;
  height:48px;
  background:#f7d77a;
  color:#000;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  font-weight:bold;
}

/* ボタン */
.btn{
  width:100%;
  background:#111;
  border:2px solid #f7d77a;
  border-radius:16px;
  padding:14px;
  margin:8px 0;
  font-size:16px;
  font-weight:bold;
  color:#f7d77a;
}
.create{
  background:linear-gradient(135deg,#f7d77a,#fff1b0,#c9972b);
  color:#000;
  border:none;
}

/* 入力欄 */
.panel{
  background:#111;
  border:1px solid #5c4a19;
  border-radius:16px;
  padding:14px;
  margin:12px 0;
  text-align:left;
}
label{
  display:block;
  font-size:13px;
  margin-top:10px;
  color:#f7d77a;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  padding:11px;
  border-radius:10px;
  border:none;
  margin-top:5px;
  font-size:15px;
}
textarea{
  resize:none;
  height:58px;
}
.hidden{display:none;}
.small{
  font-size:12px;
  color:#d8bd70;
  margin-top:8px;
}

/* 写真調整 */
.adjust{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:8px;
}
.adjust button{
  padding:11px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#f7d77a;
  color:#000;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">BREAFSDANDOG</div>
  <div class="sub">BREAFSDANDOG名刺作成</div>

  <div class="card" id="card">
    <div class="vip">VIP DOG CARD</div>
    <div class="card-title">BRIEFSDAN-DOG</div>

    <div class="card-body">
      <div class="photo-frame">
        <img id="dogPhoto" class="hidden">
        <div id="dogIcon" class="dog-placeholder">🐶</div>
        <div id="maskOverlay" class="mask-overlay mask-pink"></div>
        <div id="cardInitial" class="initial">C</div>
      </div>

      <div class="info">
        <div id="cardName" class="name">CHA CHA</div>
        <div>🎂 <span id="cardBirthday">2022.05.31</span></div>
        <div>💬 <span id="cardMessage">おやつは別腹です</span></div>
        <div>📷 <a id="instaLink" class="insta-link" href="https://instagram.com/chacha_dog" target="_blank">@chacha_dog</a></div>
      </div>
    </div>

    <div class="qr">QR</div>
  </div>

  <button class="btn create" onclick="showCreate()">＋ 名刺を作る</button>

  <div id="createPanel" class="panel hidden">

    <label>📷 写真</label>
    <input type="file" accept="image/*" onchange="loadPhoto(event)">

    <label>🔍 写真サイズ</label>
    <input id="photoScale" type="range" min="0.6" max="2.5" step="0.1" value="1" oninput="updatePhoto()">

    <label>📍 写真位置調整</label>
    <div class="adjust">
      <div></div>
      <button onclick="movePhoto(0,-10)">↑</button>
      <div></div>

      <button onclick="movePhoto(-10,0)">←</button>
      <button onclick="resetPhoto()">中央</button>
      <button onclick="movePhoto(10,0)">→</button>

      <div></div>
      <button onclick="movePhoto(0,10)">↓</button>
      <div></div>
    </div>

    <div class="small">写真を先に合わせてから、下の文字を入力してね。</div>

    <label>🎭 覆面カラー</label>
    <select id="maskColor" oninput="updateCard()">
      <option value="pink">ピンク</option>
      <option value="white">白</option>
      <option value="blue">ブルー</option>
    </select>

    <label>🔤 イニシャル</label>
    <input id="initialInput" value="C" maxlength="2" oninput="updateCard()">

    <label>🐶 名前</label>
    <input id="nameInput" value="CHA CHA" oninput="updateCard()">

    <label>🎂 誕生日</label>
    <input id="birthdayInput" value="2022.05.31" oninput="updateCard()">

    <label>💬 一言</label>
    <textarea id="messageInput" oninput="updateCard()">おやつは別腹です</textarea>

    <label>📷 Instagram</label>
    <input id="instaInput" value="@chacha_dog" oninput="updateCard()">

  </div>

  <button class="btn">💳 マイカード</button>
  <button class="btn">📸 QRコード読み取り</button>
  <button class="btn">👥 名刺帳</button>

</div>

<script>
let photoX = 0;
let photoY = 0;

function showCreate(){
  document.getElementById("createPanel").classList.toggle("hidden");
}

function updateCard(){
  const initial = document.getElementById("initialInput").value || "C";
  const name = document.getElementById("nameInput").value || "CHA CHA";
  const birthday = document.getElementById("birthdayInput").value || "2022.05.31";
  const message = document.getElementById("messageInput").value || "おやつは別腹です";
  let insta = document.getElementById("instaInput").value || "@chacha_dog";
  const color = document.getElementById("maskColor").value;

  if(!insta.startsWith("@")) insta = "@" + insta;

  document.getElementById("cardInitial").textContent = initial;
  document.getElementById("cardName").textContent = name;
  document.getElementById("cardBirthday").textContent = birthday;
  document.getElementById("cardMessage").textContent = message;

  const instaLink = document.getElementById("instaLink");
  instaLink.textContent = insta;
  instaLink.href = "https://instagram.com/" + insta.replace("@","");

  const mask = document.getElementById("maskOverlay");
  mask.className = "mask-overlay";

  if(color === "pink") mask.classList.add("mask-pink");
  if(color === "white") mask.classList.add("mask-white");
  if(color === "blue") mask.classList.add("mask-blue");
}

function loadPhoto(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const img = document.getElementById("dogPhoto");
    img.src = e.target.result;
    img.classList.remove("hidden");
    document.getElementById("dogIcon").classList.add("hidden");
    updatePhoto();
  };
  reader.readAsDataURL(file);
}

function updatePhoto(){
  const img = document.getElementById("dogPhoto");
  const scale = document.getElementById("photoScale").value;
  img.style.transform = `translate(${photoX}px, ${photoY}px) scale(${scale})`;
}

function movePhoto(x,y){
  photoX += x;
  photoY += y;
  updatePhoto();
}

function resetPhoto(){
  photoX = 0;
  photoY = 0;
  document.getElementById("photoScale").value = 1;
  updatePhoto();
}
</script>

</body>
</html>
