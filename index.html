<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAN CARD</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(180deg,#fff7fb,#eef4ff);
text-align:center;
padding:14px;
color:#333;
}

h1{
font-size:36px;
color:#5b2b00;
margin:8px 0 2px;
}

.subtitle{
font-size:15px;
color:#8a5a44;
margin-bottom:15px;
}

.formBox{
max-width:520px;
margin:0 auto 18px;
background:white;
border-radius:22px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

input, select{
width:92%;
font-size:16px;
padding:11px;
margin:7px 0;
border-radius:12px;
border:2px solid #f2d7a0;
box-sizing:border-box;
}

button{
font-size:19px;
font-weight:bold;
padding:13px 28px;
border:none;
border-radius:18px;
background:#d4a017;
color:white;
margin-top:10px;
}

.small{
font-size:14px;
color:#777;
margin-top:8px;
}

.rangeBox{
font-size:13px;
color:#666;
margin-top:5px;
}

/* 名刺カード */
.card{
max-width:720px;
aspect-ratio: 16 / 9;
margin:0 auto 25px;
border-radius:24px;
padding:18px;
box-sizing:border-box;
box-shadow:0 8px 24px rgba(0,0,0,.18);
border:5px solid #d4a017;
background:#fffdf5;
position:relative;
overflow:hidden;
}

.cardInner{
display:flex;
height:100%;
gap:18px;
align-items:center;
}

.left{
width:36%;
}

.right{
width:64%;
text-align:left;
}

.photoFrame{
width:190px;
height:190px;
max-width:100%;
margin:auto;
border-radius:22px;
overflow:hidden;
border:5px solid #d4a017;
background:#eee;
}

#dogPhoto{
width:100%;
height:100%;
object-fit:cover;
object-position:center center;
}

.vip{
font-size:23px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:10px;
}

.name{
font-size:44px;
font-weight:bold;
letter-spacing:2px;
line-height:1.1;
}

.job{
font-size:20px;
line-height:1.5;
margin-top:8px;
}

.instaBtn{
display:none;
background:#e1306c;
color:white;
font-size:17px;
font-weight:bold;
padding:10px 18px;
border-radius:999px;
text-decoration:none;
margin-top:13px;
display:none;
width:fit-content;
}

.qrArea{
display:none;
position:absolute;
right:18px;
bottom:18px;
text-align:center;
}

.qrArea img{
width:95px;
height:95px;
border-radius:12px;
border:3px solid #d4a017;
background:white;
}

.badge{
position:absolute;
left:18px;
bottom:18px;
font-size:15px;
font-weight:bold;
background:#fff0c7;
border-radius:999px;
padding:7px 15px;
color:#8a5a00;
}

/* テンプレート色 */
.vipGold{
background:#fffdf5;
border-color:#d4a017;
}
.vipGold .vip{color:#8a5a00;}
.vipGold .name{color:#4b2e05;}
.vipGold .job{color:#6b4a12;}

.tiffany{
background:#e8fffb;
border-color:#57c7c2;
}
.tiffany .vip{color:#007c89;}
.tiffany .name{color:#00636b;}
.tiffany .job{color:#007c89;}
.tiffany .photoFrame{border-color:#57c7c2;}
.tiffany .badge{background:#d7fff9;color:#007c89;}
.tiffany .qrArea img{border-color:#57c7c2;}

.princess{
background:#fff1f7;
border-color:#ff8fbd;
}
.princess .vip{color:#d63384;}
.princess .name{color:#b0005a;}
.princess .job{color:#c2186a;}
.princess .photoFrame{border-color:#ff8fbd;}
.princess .badge{background:#ffe0ef;color:#c2186a;}
.princess .qrArea img{border-color:#ff8fbd;}

.staff{
background:#f5f7ff;
border-color:#333;
}
.staff .vip{color:#222;}
.staff .name{color:#111;}
.staff .job{color:#333;}
.staff .photoFrame{border-color:#333;}
.staff .badge{background:#eee;color:#222;}
.staff .qrArea img{border-color:#333;}

.birthday{
background:#fff7dc;
border-color:#ff9f1c;
}
.birthday .vip{color:#ff6b00;}
.birthday .name{color:#c44a00;}
.birthday .job{color:#a85a00;}
.birthday .photoFrame{border-color:#ff9f1c;}
.birthday .badge{background:#fff0b8;color:#c44a00;}
.birthday .qrArea img{border-color:#ff9f1c;}

@media(max-width:600px){
.card{
aspect-ratio:auto;
min-height:360px;
}
.cardInner{
flex-direction:column;
gap:10px;
}
.left,.right{
width:100%;
text-align:center;
}
.photoFrame{
width:180px;
height:180px;
}
.name{
font-size:36px;
}
.job{
font-size:19px;
}
.instaBtn{
margin:12px auto;
}
.qrArea{
position:static;
margin-top:10px;
}
.badge{
position:static;
display:inline-block;
margin-top:12px;
}
}
</style>
</head>

<body>

<h1>🐶 WAN CARD</h1>
<div class="subtitle">世界にひとつだけのうちの子名刺</div>

<div class="formBox">
<div class="small">① 写真を選んでね</div>
<input type="file" id="photoInput" accept="image/*">

<div class="rangeBox">写真の横位置</div>
<input type="range" id="posX" min="0" max="100" value="50">

<div class="rangeBox">写真の縦位置</div>
<input type="range" id="posY" min="0" max="100" value="50">

<div class="small">② 名前を入力</div>
<input type="text" id="nameInput" placeholder="例：ぽむ">

<div class="small">③ Instagramを入力</div>
<input type="text" id="instaInput" placeholder="例：pocha1005 または Instagram URL">

<div class="small">④ 肩書きを選択</div>
<select id="jobSelect">
<option value="Chief Snack Officer<br>おやつ最高責任者">Chief Snack Officer｜おやつ最高責任者</option>
<option value="Super Model<br>モデル犬認定証">Super Model｜モデル犬認定証</option>
<option value="Security Manager<br>玄関警備主任">Security Manager｜玄関警備主任</option>
<option value="Nap Director<br>昼寝部長">Nap Director｜昼寝部長</option>
<option value="Treat Inspector<br>おやつ検査官">Treat Inspector｜おやつ検査官</option>
<option value="Dog Idol<br>わんこアイドル">Dog Idol｜わんこアイドル</option>
<option value="Professional Beggar<br>おねだり職人">Professional Beggar｜おねだり職人</option>
<option value="Sleeping Champion<br>昼寝世界王者">Sleeping Champion｜昼寝世界王者</option>
<option value="Walk Leader<br>お散歩推進部長">Walk Leader｜お散歩推進部長</option>
<option value="Sofa Guard<br>ソファー警備隊長">Sofa Guard｜ソファー警備隊長</option>
</select>

<div class="small">⑤ デザインを選択</div>
<select id="templateSelect">
<option value="vipGold">👑 VIPゴールド</option>
<option value="tiffany">💎 ティファニーブルー</option>
<option value="princess">🎀 プリンセス</option>
<option value="staff">🏢 社員証</option>
<option value="birthday">🎂 バースデー</option>
</select>

<br>
<button onclick="makeCard()">✨ 名刺を作る</button>
</div>

<div id="wanCard" class="card vipGold">

<div class="cardInner">

<div class="left">
<div class="photoFrame">
<img id="dogPhoto" src="https://placehold.co/300x300?text=WAN">
</div>
</div>

<div class="right">
<div id="cardTitle" class="vip">👑 VIP MEMBER CARD</div>

<div id="cardName" class="name">POMU</div>

<div id="cardJob" class="job">
Chief Snack Officer<br>
おやつ最高責任者
</div>

<a id="instaBtn" class="instaBtn" target="_blank">
📸 Instagramを見る
</a>
</div>

</div>

<div id="qrArea" class="qrArea">
<img id="qrImage">
</div>

<div class="badge">
🐾 OFFICIAL WAN CARD 🐾
</div>

</div>

<script>
const photoInput = document.getElementById("photoInput");
const dogPhoto = document.getElementById("dogPhoto");
const posX = document.getElementById("posX");
const posY = document.getElementById("posY");

photoInput.addEventListener("change", function(event){
 const file = event.target.files[0];

 if(file){
   const reader = new FileReader();

   reader.onload = function(e){
     dogPhoto.src = e.target.result;
   };

   reader.readAsDataURL(file);
 }
});

function updatePhotoPosition(){
 dogPhoto.style.objectPosition = posX.value + "% " + posY.value + "%";
}

posX.addEventListener("input", updatePhotoPosition);
posY.addEventListener("input", updatePhotoPosition);

function makeCard(){
 const name = document.getElementById("nameInput").value.trim();
 const job = document.getElementById("jobSelect").value;
 const insta = document.getElementById("instaInput").value.trim();
 const template = document.getElementById("templateSelect").value;

 const card = document.getElementById("wanCard");
 card.className = "card " + template;

 if(name !== ""){
   document.getElementById("cardName").innerHTML = name;
 }

 document.getElementById("cardJob").innerHTML = job;

 const title = document.getElementById("cardTitle");

 if(template === "tiffany"){
   title.innerHTML = "💎 LUXURY MEMBER CARD";
 }else if(template === "princess"){
   title.innerHTML = "👑 PRINCESS MEMBER";
 }else if(template === "staff"){
   title.innerHTML = "🏢 WAN COMPANY ID";
 }else if(template === "birthday"){
   title.innerHTML = "🎂 HAPPY BIRTHDAY CARD";
 }else{
   title.innerHTML = "👑 VIP MEMBER CARD";
 }

 if(insta !== ""){
   let url = insta;

   if(!url.startsWith("http")){
     url = "https://www.instagram.com/" + insta.replace("@","");
   }

   document.getElementById("instaBtn").href = url;
   document.getElementById("instaBtn").style.display = "block";

   document.getElementById("qrImage").src =
   "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);

   document.getElementById("qrArea").style.display = "block";
 }
}
</script>

</body>
</html>
