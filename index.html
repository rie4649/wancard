<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAN CARD</title>

<style>
body{
font-family:sans-serif;
background:#f7f2ff;
text-align:center;
padding:14px;
color:#333;
}
h1{
font-size:36px;
margin:8px 0 4px;
color:#5b2b00;
}
.subtitle{font-size:15px;color:#8a5a44;margin-bottom:15px}
.box{
max-width:560px;
margin:0 auto 18px;
background:white;
border-radius:24px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,.12);
}
input,select{
width:92%;
font-size:16px;
padding:11px;
margin:7px 0;
border-radius:12px;
border:2px solid #d8c6ff;
box-sizing:border-box;
}
button{
font-size:18px;
font-weight:bold;
padding:12px 24px;
border:none;
border-radius:18px;
background:#8b5cf6;
color:white;
margin:8px 4px;
}
.small{font-size:14px;color:#777;margin-top:8px}

.card{
max-width:420px;
margin:0 auto 20px;
border-radius:30px;
padding:18px;
box-shadow:0 8px 26px rgba(0,0,0,.22);
border:6px solid #57c7c2;
background:linear-gradient(180deg,#dffff8,#ffffff);
position:relative;
overflow:hidden;
}
.card:before{
content:"💎 🐾 ✨ 🐾 💎";
position:absolute;
top:10px;
left:0;
width:100%;
font-size:28px;
opacity:.2;
}
.title{
font-size:26px;
font-weight:bold;
color:#007c89;
margin-bottom:10px;
position:relative;
z-index:2;
}
.photoFrame{
width:300px;
height:300px;
margin:auto;
border-radius:30px;
overflow:hidden;
border:6px solid #57c7c2;
background:#eee;
position:relative;
z-index:2;
}
#dogPhoto{
width:100%;
height:100%;
object-fit:cover;
object-position:center center;
}
.name{
font-size:42px;
font-weight:bold;
color:#005f66;
margin-top:12px;
position:relative;
z-index:2;
}
.info,.job{
font-size:17px;
line-height:1.6;
color:#007c89;
font-weight:bold;
position:relative;
z-index:2;
}
.message{
display:inline-block;
background:white;
border-radius:18px;
padding:9px 14px;
margin-top:10px;
font-weight:bold;
color:#007c89;
position:relative;
z-index:2;
}
#instaBtn{
display:none;
background:#e1306c;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:999px;
padding:10px 18px;
margin:12px auto;
width:fit-content;
position:relative;
z-index:2;
}
#qrBox{display:none;position:relative;z-index:2;margin-top:8px}
#qrImage{
width:110px;
height:110px;
border:3px solid #57c7c2;
border-radius:12px;
background:white;
}
.actionBox{
max-width:420px;
margin:0 auto 20px;
background:white;
border-radius:24px;
padding:14px;
box-shadow:0 6px 16px rgba(0,0,0,.12);
}
.friendBox{
background:#f6edff;
border-radius:18px;
padding:12px;
font-size:15px;
line-height:1.8;
}
</style>
</head>

<body>

<h1>🐾 WAN CARD</h1>
<div class="subtitle">うちの子プロフィール名刺</div>

<div class="box">

<div class="small">🐶 名前</div>
<input id="nameInput" placeholder="例：ぽむ">

<div class="small">🎂 誕生日</div>
<input id="birthdayInput" placeholder="例：2021.05.10">

<div class="small">👑 肩書き</div>
<select id="jobInput">
<option value="Chief Snack Officer<br>おやつ最高責任者">Chief Snack Officer｜おやつ最高責任者</option>
<option value="Super Model<br>モデル犬認定証">Super Model｜モデル犬認定証</option>
<option value="Princess Member<br>お姫様認定証">Princess Member｜お姫様認定証</option>
<option value="Security Manager<br>玄関警備主任">Security Manager｜玄関警備主任</option>
<option value="Sleeping Champion<br>昼寝世界王者">Sleeping Champion｜昼寝世界王者</option>
</select>

<div class="small">⭐ 特徴</div>
<select id="featureInput">
<option>おやつ大好き</option>
<option>人懐っこい</option>
<option>甘えん坊</option>
<option>お散歩大好き</option>
<option>モデル犬</option>
<option>お昼寝大好き</option>
</select>

<div class="small">💬 一言</div>
<input id="messageInput" placeholder="例：お友達募集中🐶">

<div class="small">📸 Instagram</div>
<input id="instaInput" placeholder="例：pocha1005">

<div class="small">📷 写真を選んでね</div>
<input type="file" id="photoInput" accept="image/*">

<div class="small">写真の横位置</div>
<input type="range" id="posX" min="0" max="100" value="50">

<div class="small">写真の縦位置</div>
<input type="range" id="posY" min="0" max="100" value="50">

<button onclick="makeCard()">✨ 名刺を作る</button>
</div>

<div id="card" class="card">
<div class="title">💎 TIFFANY MEMBER</div>

<div class="photoFrame">
<img id="dogPhoto" src="https://placehold.co/300x300?text=WAN">
</div>

<div id="cardName" class="name">POMU</div>

<div id="cardInfo" class="info">
🎂 Birthday：ひみつ<br>
⭐ 特徴：おやつ大好き
</div>

<div id="cardJob" class="job">
Chief Snack Officer<br>
おやつ最高責任者
</div>

<div id="cardMessage" class="message">
お友達募集中🐶
</div>

<a id="instaBtn" target="_blank">📸 Instagramを見る</a>

<div id="qrBox">
<div class="small">QRコードで簡単交換</div>
<img id="qrImage">
</div>
</div>

<div class="actionBox">
<button onclick="alert('次のバージョンで、自分の名刺帳に保存できるようにするよ🐶')">💾 自分の名刺として保存</button>
<button onclick="alert('次のバージョンでQR読み取りを作るよ📷')">📷 QRコード読み取り</button>

<h3>📒 名刺交換したお友達</h3>
<div class="friendBox">
まだ交換した名刺はありません🐾<br>
ここにお友達のWAN CARDが保存されます
</div>
</div>

<script>
const dogPhoto=document.getElementById("dogPhoto");

document.getElementById("photoInput").addEventListener("change",function(e){
 const file=e.target.files[0];
 if(file){
   const reader=new FileReader();
   reader.onload=function(ev){
     dogPhoto.src=ev.target.result;
   };
   reader.readAsDataURL(file);
 }
});

function updatePos(){
 dogPhoto.style.objectPosition=
 document.getElementById("posX").value+"% "+
 document.getElementById("posY").value+"%";
}
document.getElementById("posX").addEventListener("input",updatePos);
document.getElementById("posY").addEventListener("input",updatePos);

function makeCard(){
 const name=document.getElementById("nameInput").value.trim();
 const birthday=document.getElementById("birthdayInput").value.trim();
 const job=document.getElementById("jobInput").value;
 const feature=document.getElementById("featureInput").value;
 const message=document.getElementById("messageInput").value.trim();
 const insta=document.getElementById("instaInput").value.trim();

 if(name) document.getElementById("cardName").innerHTML=name;

 document.getElementById("cardInfo").innerHTML=
 "🎂 Birthday："+(birthday || "ひみつ")+"<br>⭐ 特徴："+feature;

 document.getElementById("cardJob").innerHTML=job;

 if(message) document.getElementById("cardMessage").innerHTML=message;

 if(insta){
   let url=insta;
   if(!url.startsWith("http")){
     url="https://www.instagram.com/"+insta.replace("@","");
   }
   document.getElementById("instaBtn").href=url;
   document.getElementById("instaBtn").style.display="block";
   document.getElementById("qrImage").src=
   "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+encodeURIComponent(url);
   document.getElementById("qrBox").style.display="block";
 }
}
</script>

</body>
</html>
