<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAN CARD</title>

<style>
body{
font-family:sans-serif;
background:#f5f7ff;
text-align:center;
padding:20px;
color:#333;
}

.card{
max-width:420px;
margin:auto;
background:white;
border-radius:24px;
padding:22px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.vip{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:18px;
border-radius:18px;
font-size:26px;
font-weight:bold;
margin-bottom:18px;
letter-spacing:1px;
}

input{
font-size:16px;
margin:8px 0;
}

img{
width:190px;
height:190px;
object-fit:cover;
border-radius:18px;
background:#eee;
}

.name{
font-size:34px;
font-weight:bold;
margin-top:18px;
letter-spacing:2px;
}

.job{
font-size:20px;
color:#666;
line-height:1.7;
margin-top:8px;
}

.small{
font-size:14px;
color:#777;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<div class="vip">
👑 VIP MEMBER CARD
</div>

<div class="small">写真を選んでね🐶</div>

<input type="file" id="photoInput" accept="image/*">

<br><br>

<img id="dogPhoto" src="https://placehold.co/300x300?text=WAN">

<div class="name">
CHA CHA
</div>

<div class="job">
Chief Snack Officer<br>
おやつ最高責任者
</div>

</div>

<script>
document.getElementById("photoInput").addEventListener("change", function(event){
 const file = event.target.files[0];

 if(file){
   const reader = new FileReader();

   reader.onload = function(e){
     document.getElementById("dogPhoto").src = e.target.result;
   };

   reader.readAsDataURL(file);
 }
});
</script>

</body>
</html>
