<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺メーカー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
  <h1>名刺メーカー</h1>

  <section class="preview-wrap">
    <div id="card" class="vip-card">

      <div class="photo-frame">
        <img id="dogPhoto" class="dog-photo">
        <div id="photoGuide" class="photo-guide">写真</div>

        <div id="maskGroup" class="mask-group">
          <img id="maskPhoto" class="mask-photo" src="black.png">
          <div id="maskInitial" class="mask-initial"></div>
        </div>
      </div>

      <div id="previewName" class="preview-name">Your Name</div>
      <div id="previewMemberId" class="preview-id">2025-00001</div>
      <div id="previewBirthday" class="preview-birthday">Birthday</div>
      <div id="previewInstagram" class="preview-instagram">@instagram</div>

    </div>
  </section>

  <section class="editor">

    <div class="panel">
      <h2>写真・覆面</h2>

      <label>写真を選ぶ</label>
      <input type="file" id="photoInput" accept="image/*">

      <label>覆面カラー</label>
      <select id="maskSelect">
        <option value="black.png">黒</option>
        <option value="pink.png">ピンク</option>
        <option value="blue.png">青</option>
      </select>

      <label>写真 左右</label>
      <input type="range" id="photoX" min="-200" max="200" value="0">

      <label>写真 上下</label>
      <input type="range" id="photoY" min="-200" max="200" value="0">

      <label>写真 大きさ</label>
      <input type="range" id="photoScale" min="60" max="260" value="120">

      <label>覆面 左右</label>
      <input type="range" id="maskX" min="-200" max="200" value="0">

      <label>覆面 上下</label>
      <input type="range" id="maskY" min="-200" max="200" value="0">

      <label>覆面 大きさ</label>
      <input type="range" id="maskScale" min="80" max="280" value="150">
    </div>

    <div class="panel">
      <h2>文字</h2>

      <label>名前</label>
      <input type="text" id="nameInput" placeholder="CHA CHA">

      <label>誕生日</label>
      <input type="text" id="birthdayInput" placeholder="2022.05.31">

      <label>Instagram</label>
      <input type="text" id="instagramInput" placeholder="@chacha_dog">

      <label>イニシャル</label>
      <input type="text" id="initialInput" maxlength="2" placeholder="C">

      <label>MEMBER ID</label>
      <input type="text" id="memberIdInput" placeholder="2025-00001">

      <button id="saveBtn">画像保存</button>
    </div>

  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
