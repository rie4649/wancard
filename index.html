<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIEFSDAN-DOG</title>

<style>
:root{
  --main:#ff4fa3;
  --soft:#ffb3d7;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050505;
  color:white;
  text-align:center;
}
.app{
  max-width:430px;
  margin:auto;
  padding:18px;
}
.logo{
  color:var(--main);
  font-size:25px;
  font-weight:900;
  letter-spacing:2px;
  margin:18px 0 6px;
}
.sub{
  color:#aaa;
  font-size:13px;
  margin-bottom:16px;
}

/* 横長名刺 */
.card{
  width:100%;
  aspect-ratio:1.78/1;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,79,163,.22), transparent 35%),
    linear-gradient(135deg,#111,#050505);
  border:2px solid var(--main);
  border-radius:22px;
  box-shadow:0 0 24px rgba(255,79,163,.45);
  box-sizing:border-box;
  padding:14px;
  position:relative;
  overflow:hidden;
}
.card-title{
  color:var(--main);
  font-size:17px;
  font-weight:900;
  letter-spacing:2px;
  text-align:left;
  margin-bottom:8px;
}
.card-body{
  display:flex;
  gap:12px;
  align-items:center;
}
.photo-frame{
  width:43%;
  aspect-ratio:1.15/1;
  border:3px solid var(--main);
  border-radius:18px;
  background:#151515;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 14px rgba(255,79,163,.55);
}
.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform-origin:center;
}
.placeholder{
  font-size:48px;
  margin-top:25px;
}

/* 仮の覆面マーク */
.mask{
  position:absolute;
  inset:12px 18px 18px;
  border:7px solid var(--main);
  border-radius:48% 48% 40% 40%;
  pointer-events:none;
  box-shadow:0 0 8px #000;
}
.initial{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:900;
  color:white;
  text-shadow:0 0 6px #000;
}

.info{
  flex:1;
  text-align:left;
  font-size:13px;
  line-height:1.75;
}
.name{
  color:var(--main);
  font-size:24px;
  font-weight:900;
  margin-bottom:4px;
}
.insta{
  color:var(--main);
  text-decoration:none;
  font-weight:bold;
}
.qr{
  position:absolute;
  right:14px;
  bottom:12px;
  width:50px;
  height:50px;
  background:white;
  color:#111;
  border:3px solid var(--main);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:11px;
}

/* 入力 */
.panel{
  margin-top:16px;
  background:#111;
  border:1px solid #333;
  border-radius:20px;
  padding:14px;
  text-align:left;
}
label{
  display:block;
  margin-top:11px;
  font-size:13px;
  color:#ddd;
}
input,textarea,select{
  width:100%;
  box-sizing:border-box;
  margin-top:5px;
  padding:11px;
  border:0;
  border-radius:12px;
  font-size:15px;
}
textarea{
  height:58px;
  resize:none;
}
.adjust{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:8px;
}
.adjust button,.mainbtn{
  border:0;
  border-radius:12px;
  padding:12px;
  font-weight:900;
  background:var(--main);
  color:white;
}
.mainbtn{
  width:100%;
  margin-top:16px;
  font-size:16px;
}
.hidden{display:none;}
</style>
</head>

<body>
<div class="app">

  <div class="logo">BRIEFSDAN-DOG</div>
  <div class="sub">VIP DOG CARD 名刺作成</div>

  <div class="card">
    <div class="card-title">BRIEFSDAN-DOG</div>

    <div class="card-body">
      <div class="photo-frame">
        <img id="dogPhoto" class="hidden">
        <div id="dogIcon" class="placeholder">🐶</div>
        <div class="mask"></div>
        <div id="cardInitial" class="initial">C</div>
      </div>

      <div class="info">
        <div id="cardName" class="name">CHA CHA</div>
        <div>🎂 <span id="cardBirthday">2022.05.31</span></div>
        <div>💬 <span id="cardMessage">おやつは別腹です！</span></div>
        <div>📷 <a id="instaLink" class="insta" href="https://instagram.com/chacha_dog" target="_blank">@chacha_dog</a></div>
      </div>
    </div>

    <div class="qr">QR</div>
  </div>

  <div class="panel">

    <label>📷 写真</label>
    <input type="file" accept="image/*" onchange="loadPhoto(event)">

    <label>🔍 写真サイズ</label>
    <input id="photoScale" type="range" min="0.6" max="2.8" step="0.1" value="1" oninput="updatePhoto()">

    <label>📍 写真位置</label>
    <div class="adjust">
      <div></div><button onclick="movePhoto(0,-10)">↑</button><div></div>
      <button onclick="movePhoto(-10,0)">←</button>
      <button onclick="resetPhoto()">中央</button>
      <button onclick="movePhoto(10,0)">→</button>
      <div></div><button onclick="movePhoto(0,10)">↓</button><div></div>
    </div>

    <label>🎭 カラー</label>
    <select id="themeColor" oninput="changeTheme()">
      <option value="pink">ピンク</option>
      <option value="white">白</option>
      <option value="blue">ブルー</option>
    </select>

    <label>🔤 イニシャル</label>
    <input id="initialInput" value="C" maxlength="2" oninput="updateCard()">

    <label>🐶 名前</label>
    <input id="nameInput" value="CHA CHA" oninput="updateCard()">

    <label>🎂 誕生日</label>
    <input id="birthdayInput" value="2022.05.31" oninput="updateCard()">

    <label>💬 一言</label>
    <textarea id="messageInput" oninput="updateCard()">おやつは別腹です！</textarea>

    <label>📷 Instagram</label>
    <input id="instaInput" value="@chacha_dog" oninput="updateCard()">

    <button class="mainbtn" onclick="updateCard()">🐾 名刺を作成する</button>
  </div>

</div>

<script>
let photoX = 0;
let photoY = 0;

function updateCard(){
  const initial = document.getElementById("initialInput").value || "C";
  const name = document.getElementById("nameInput").value || "CHA CHA";
  const birthday = document.getElementById("birthdayInput").value || "2022.05.31";
  const message = document.getElementById("messageInput").value || "おやつは別腹です！";
  let insta = document.getElementById("instaInput").value || "@chacha_dog";

  if(!insta.startsWith("@")) insta = "@" + insta;

  document.getElementById("cardInitial").textContent = initial;
  document.getElementById("cardName").textContent = name;
  document.getElementById("cardBirthday").textContent = birthday;
  document.getElementById("cardMessage").textContent = message;

  const link = document.getElementById("instaLink");
  link.textContent = insta;
  link.href = "https://instagram.com/" + insta.replace("@","");
}

function changeTheme(){
  const color = document.getElementById("themeColor").value;
  const root = document.documentElement;

  if(color === "pink"){
    root.style.setProperty("--main","#ff4fa3");
    root.style.setProperty("--soft","#ffb3d7");
  }
  if(color === "white"){
    root.style.setProperty("--main","#ffffff");
    root.style.setProperty("--soft","#dddddd");
  }
  if(color === "blue"){
    root.style.setProperty("--main","#35bfff");
    root.style.setProperty("--soft","#9ce2ff");
  }
}

function loadPhoto(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const img = document.getElementById("dogPhoto");
    img.src = e.target.result;
    img.classList.remove("hidden");
    document.getElementById("dogIcon").classList.add("hidden");
    updatePhoto();
  };
  reader.readAsDataURL(file);
}

function updatePhoto(){
  const img = document.getElementById("dogPhoto");
  const scale = document.getElementById("photoScale").value;
  img.style.transform = `translate(${photoX}px, ${photoY}px) scale(${scale})`;
}

function movePhoto(x,y){
  photoX += x;
  photoY += y;
  updatePhoto();
}

function resetPhoto(){
  photoX = 0;
  photoY = 0;
  document.getElementById("photoScale").value = 1;
  updatePhoto();
}
</script>

</body>
</html>
