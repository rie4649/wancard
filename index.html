<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIEFSDAN-DOG</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#050505;
  color:white;
  text-align:center;
}
.app{
  max-width:430px;
  margin:auto;
  padding:18px;
}
.logo{
  font-size:26px;
  font-weight:900;
  letter-spacing:2px;
  margin:18px 0 6px;
}
.sub{
  color:#ccc;
  font-size:13px;
  margin-bottom:18px;
}

/* 横長名刺 */
.card{
  width:100%;
  aspect-ratio:1.75/1;
  background:#0b0b0b;
  border:2px solid #fff;
  border-radius:18px;
  padding:14px;
  box-sizing:border-box;
  box-shadow:0 0 18px rgba(255,255,255,.25);
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
}
.card-title{
  font-weight:900;
  font-size:16px;
  letter-spacing:2px;
  margin-bottom:8px;
}
.card-body{
  display:flex;
  gap:12px;
  align-items:center;
}

/* 社員証風写真枠 */
.photo-frame{
  width:42%;
  aspect-ratio:1.15/1;
  background:#222;
  border:4px solid white;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,255,255,.35);
}
.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform-origin:center center;
}
.dog-placeholder{
  font-size:48px;
  margin-top:22px;
}

/* 覆面 */
.mask-overlay{
  position:absolute;
  inset:8px;
  border:8px solid #ff7ac8;
  border-radius:45% 45% 35% 35%;
  pointer-events:none;
  box-shadow:0 0 8px rgba(0,0,0,.8);
}
.mask-pink{border-color:#ff7ac8;}
.mask-white{border-color:#fff;}
.mask-blue{border-color:#7ddcff;}

.initial{
  position:absolute;
  top:7px;
  left:50%;
  transform:translateX(-50%);
  font-weight:900;
  font-size:26px;
  color:white;
  text-shadow:0 0 6px black;
  z-index:5;
}

/* 文字情報 */
.info{
  flex:1;
  text-align:left;
  font-size:13px;
  line-height:1.7;
}
.name{
  font-size:22px;
  font-weight:900;
  color:#ff7ac8;
}
.qr{
  position:absolute;
  right:14px;
  bottom:12px;
  width:46px;
  height:46px;
  background:white;
  color:black;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  font-weight:bold;
}

/* ボタン */
.btn{
  width:100%;
  background:#141414;
  border:2px solid #fff;
  border-radius:16px;
  padding:14px;
  margin:8px 0;
  font-size:16px;
  font-weight:bold;
  color:white;
}
.create{
  background:linear-gradient(135deg,#ff7ac8,#7ddcff);
  color:#000;
  border:none;
}

/* 入力欄 */
.panel{
  background:#111;
  border:1px solid #333;
  border-radius:16px;
  padding:14px;
  margin-top:15px;
  text-align:left;
}
label{
  display:block;
  font-size:13px;
  margin-top:10px;
  color:#ddd;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:5px;
  font-size:15px;
}
textarea{
  resize:none;
  height:60px;
}
.hidden{
  display:none;
}
.small{
  font-size:12px;
  color:#aaa;
}

/* 写真調整ボタン */
.adjust{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:8px;
}
.adjust button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">BRIEFSDAN-DOG</div>
  <div class="sub">覆面レスラー犬の横長名刺メーカー</div>

  <div class="card" id="card">
    <div class="card-title">BRIEFSDAN-DOG</div>

    <div class="card-body">
      <div class="photo-frame">
        <img id="dogPhoto" class="hidden">
        <div id="dogIcon" class="dog-placeholder">🐶</div>

        <div id="maskOverlay" class="mask-overlay mask-pink"></div>
        <div id="cardInitial" class="initial">C</div>
      </div>

      <div class="info">
        <div id="cardName" class="name">CHA CHA</div>
        <div>🎂 <span id="cardBirthday">2016.05.31</span></div>
        <div>💬 <span id="cardMessage">おやつは別腹です</span></div>
        <div>📷 <span id="cardInsta">@chacha_dog</span></div>
      </div>
    </div>

    <div class="qr">QR</div>
  </div>

  <button class="btn create" onclick="showCreate()">＋ 名刺を作る</button>
  <button class="btn">💳 マイカード</button>
  <button class="btn">📸 QRコード読み取り</button>
  <button class="btn">👥 名刺帳</button>

  <div id="createPanel" class="panel hidden">

    <label>📷 写真</label>
    <input type="file" accept="image/*" onchange="loadPhoto(event)">

    <label>🎭 覆面カラー</label>
    <select id="maskColor" oninput="updateCard()">
      <option value="pink">ピンク</option>
      <option value="white">白</option>
      <option value="blue">ブルー</option>
    </select>

    <label>🔤 イニシャル</label>
    <input id="initialInput" value="C" maxlength="2" oninput="updateCard()">

    <label>🐶 名前</label>
    <input id="nameInput" value="CHA CHA" oninput="updateCard()">

    <label>🎂 誕生日</label>
    <input id="birthdayInput" value="2016.05.31" oninput="updateCard()">

    <label>💬 一言</label>
    <textarea id="messageInput" oninput="updateCard()">おやつは別腹です</textarea>

    <label>📷 Instagram</label>
    <input id="instaInput" value="@chacha_dog" oninput="updateCard()">

    <label>🔍 写真サイズ</label>
    <input id="photoScale" type="range" min="0.6" max="2.5" step="0.1" value="1" oninput="updatePhoto()">

    <label>📍 写真位置調整</label>
    <div class="adjust">
      <div></div>
      <button onclick="movePhoto(0,-10)">↑</button>
      <div></div>

      <button onclick="movePhoto(-10,0)">←</button>
      <button onclick="resetPhoto()">中央</button>
      <button onclick="movePhoto(10,0)">→</button>

      <div></div>
      <button onclick="movePhoto(0,10)">↓</button>
      <div></div>
    </div>

    <div class="small">写真は拡大・縮小・上下左右に動かせるよ</div>

  </div>

</div>

<script>
let photoX = 0;
let photoY = 0;

function showCreate(){
  document.getElementById("createPanel").classList.toggle("hidden");
}

function updateCard(){
  const initial = document.getElementById("initialInput").value || "C";
  const name = document.getElementById("nameInput").value || "CHA CHA";
  const birthday = document.getElementById("birthdayInput").value || "2016.05.31";
  const message = document.getElementById("messageInput").value || "おやつは別腹です";
  const insta = document.getElementById("instaInput").value || "@chacha_dog";
  const color = document.getElementById("maskColor").value;

  document.getElementById("cardInitial").textContent = initial;
  document.getElementById("cardName").textContent = name;
  document.getElementById("cardBirthday").textContent = birthday;
  document.getElementById("cardMessage").textContent = message;
  document.getElementById("cardInsta").textContent = insta;

  const mask = document.getElementById("maskOverlay");
  const nameEl = document.getElementById("cardName");

  mask.className = "mask-overlay";
  nameEl.style.color = "#ff7ac8";

  if(color === "pink"){
    mask.classList.add("mask-pink");
    nameEl.style.color = "#ff7ac8";
  }
  if(color === "white"){
    mask.classList.add("mask-white");
    nameEl.style.color = "#ffffff";
  }
  if(color === "blue"){
    mask.classList.add("mask-blue");
    nameEl.style.color = "#7ddcff";
  }
}

function loadPhoto(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const img = document.getElementById("dogPhoto");
    img.src = e.target.result;
    img.classList.remove("hidden");
    document.getElementById("dogIcon").classList.add("hidden");
    updatePhoto();
  };
  reader.readAsDataURL(file);
}

function updatePhoto(){
  const img = document.getElementById("dogPhoto");
  const scale = document.getElementById("photoScale").value;
  img.style.transform = `translate(${photoX}px, ${photoY}px) scale(${scale})`;
}

function movePhoto(x,y){
  photoX += x;
  photoY += y;
  updatePhoto();
}

function resetPhoto(){
  photoX = 0;
  photoY = 0;
  document.getElementById("photoScale").value = 1;
  updatePhoto();
}
</script>

</body>
</html>
